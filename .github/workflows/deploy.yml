name: Deploy CV Site

on:
  push:
    branches:
      - main

jobs:
  # --- Phase 1: Build and Push to Docker Hub ---
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/cv-site:latest

  # --- Phase 2: Deploy to AWS EC2 ---
  deploy:
    needs: build-and-push # This tells GitHub to wait until the build is finished!
    runs-on: ubuntu-latest
    steps:
      - name: Execute remote SSH commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. Pull the newly built image from Docker Hub
            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/cv-site:latest
            
            # 2. Stop and remove the currently running container (ignore errors if it's not running)
            sudo docker stop cv-site || true
            sudo docker rm cv-site || true
            
            # 3. Start the new container
            sudo docker run -d --name cv-site -p 80:80 ${{ secrets.DOCKER_USERNAME }}/cv-site:latest
